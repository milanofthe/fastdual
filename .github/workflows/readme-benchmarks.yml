name: Update README benchmarks

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[test,benchmark]" matplotlib

      - name: Run benchmarks and patch README
        run: python scripts/update_readme_benchmarks.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md assets/ || {
            git add README.md assets/
            git commit -m "Update README benchmark results [skip ci]"
            git push
          }
